<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi-fi.AI | Music Analyzer</title>
    <style>
        /* Base Dark Theme */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #000000; /* Pure black */
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Prevents double scrollbars */
        }

        /* The Intro Popup (Modal) */
        #welcome-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(15px);
        }

        .modal-content {
            background: #1a1a1a;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 450px;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .modal-content h1 {
            color: #1DB954; /* Spotify-style green */
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .modal-content p {
            color: #ccc;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .start-btn {
            background: #1DB954;
            color: black;
            border: none;
            padding: 14px 35px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .start-btn:hover {
            transform: scale(1.05);
            background: #1ed760;
        }

        /* Chat Container - Fixed to fill screen */
        #chat-interface {
            width: 100%;
            height: 100vh;
            display: block;
        }

        iframe {
            border: none;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div id="welcome-modal">
        <div class="modal-content">
            <h1>MI-FI.AI</h1>
            <p>Proudly Developed in India.<br><br>Analyze your music taste, explore genres, and get recommendations based on your unique vibe.</p>
            <button class="start-btn" onclick="closeModal()">Start Analyzing</button>
        </div>
    </div>

    <div id="chat-interface">
        <iframe
            src="https://www.chatbase.co/chatbot-iframe/Ccfl1drfY8xSxImHPctSu"
            title="mi-fi.ai"
            frameborder="0"
        ></iframe>
    </div>

    <script>
        function closeModal() {
            // Hide the modal
            document.getElementById('welcome-modal').style.display = 'none';
            // Allow scrolling if the chat content is long
            document.body.style.overflow = 'auto';
        }
    </script>

</body>
</html>
